filebeat.inputs:
- type: log
  enabled: true
  paths:
    # Airflow의 모든 DAG와 Task 로그(.log)를 수집
    - /usr/share/filebeat/airflow_logs/**/*.log
  
  # 로그 파싱 (선택 사항: SUCCESS/ERROR 필터링을 위해)
  # multiline 설정은 스택 트레이스(에러로그)가 여러 줄일 때 하나로 묶어줍니다.
  multiline.pattern: '^\['
  multiline.negate: true
  multiline.match: after

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "airflow-logs-%{+yyyy.MM.dd}"

setup.ilm.enabled: false