name: Medallion Airflow CI/CD to K3s

on:
  push:
    branches: [ "main" ]  # main 브랜치에 push될 때 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 빌드 속도 향상을 위한 빌드업 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Dockerfile 빌드 및 푸시 (dags, plugins 등이 포함됨)
      - name: Build and Push Airflow Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/medallion-airflow:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/medallion-airflow:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-k3s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # K3s 서버 접속 정보 설정
      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      # Helm을 이용한 배포 및 이미지 태그 업데이트
      - name: Deploy to K3s with Helm
        run: |
          # 1. Airflow 공식 차트 리포지토리 추가
          helm repo add apache-airflow https://airflow.apache.org/
          helm repo update
          
          # 2. Helm 업그레이드 실행
          # --set 옵션으로 빌드된 최신 이미지 태그를 전달합니다.
          helm upgrade --install airflow apache-airflow/airflow \
            --namespace airflow \
            --create-namespace \
            -f values.yaml \
            --set images.airflow.repository=${{ secrets.DOCKERHUB_USERNAME }}/medallion-airflow \
            --set images.airflow.tag=${{ github.sha }} \
            --wait \
            --timeout 10m0s

      - name: Verify Deployment
        run: |
          kubectl get pods -n airflow
          kubectl rollout status deployment/airflow-scheduler -n airflow
