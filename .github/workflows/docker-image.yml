name: Medallion Airflow CI/CD (GitOps with ArgoCD)

on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 올라오면 실행

permissions:
  contents: write # 중요: values.yaml 파일을 수정해서 다시 Push하려면 쓰기 권한이 필요함

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Airflow Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 1. latest 태그와 2. 고유한 커밋 SHA 태그를 동시에 생성
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/medallion-airflow:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/medallion-airflow:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}

      - name: Update values.yaml Image Tag
        run: |
          # chart/values.yaml 파일(혹은 본인의 경로)에서 tag: "..." 부분을 
          # 이번에 빌드된 ${{ github.sha }}로 자동 교체합니다.
          # 주의: 경로가 'chart/values.yaml'인지 확인하세요!
          sed -i 's/tag: .*/tag: "${{ github.sha }}"/g' chart/values.yaml

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add chart/values.yaml
          # [skip ci]를 메시지에 넣어야 Actions가 무한 루프에 빠지지 않습니다.
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push