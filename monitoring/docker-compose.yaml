version: '3.8'
services:
  statsd-exporter:
    image: prom/statsd-exporter
    container_name: statsd-exporter
    ports:
      - "9102:9102"      # Prometheus가 긁어가는 포트 (TCP)
      - "8125:8125/udp"  # Airflow가 메트릭을 쏘는 포트 (UDP)
    networks:
      - monitoring_net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring_net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring_net

networks:
  monitoring_net:
    external: true